    kuro: { id: "kuro", name: { en: "Kuro Island", it: "Kuro", ru: "Куро", ja: "黒島" }, mainImg: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Kuroshima_Island_view.jpg/800px-Kuroshima_Island_view.jpg", officialUrl: "https://www.town.taketomi.lg.jp/about/kuroshima/", desc: { en: "Peaceful cattle island with crystal shallows.", it: "Isola tranquilla di bovini con acque basse cristalline.", ru: "Спокойный остров с крупным рогатым скотом.", ja: "牛が多く、美しい浅瀬でのんびり。" }, access: { en: "High-speed boat from Ishigaki (25 min).", it: "Barca veloce da Ishigaki (25 min).", ru: "Быстрый катер из Исигаки.", ja: "石垣島から高速艇。" }, sights: { en: "Kuroshima Stellata, Nakamoto Beach, Traditional houses.", it: "Kuroshima Stellata, Spiaggia Nakamoto, case tradizionali.", ru: "Пляж Куросима, дом Накамото.", ja: "黒島展望台、仲本海岸。" }, tips: { en: "Rent a bicycle and circle the island in 1.5h.", it: "Noleggia bicicletta e giro in 1,5 h.", ru: "Арендуйте велосипед.", ja: "レンタサイクルで１周約1.5時間。" } },
    hatoma: { id: "hatoma", name: { en: "Hatoma", it: "Hatoma", ru: "Хатома", ja: "鳩間島" }, mainImg: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Hatoma_Island_Aerial.jpg/800px-Hatoma_Island_Aerial.jpg", officialUrl: "https://www.town.taketomi.lg.jp/about/hatoma/", desc: { en: "Remote tiny island with pristine beaches and quiet life.", it: "Piccola isola remota con spiagge incontaminate.", ru: "Маленький уединенный остров с нетронутыми пляжами.", ja: "小さな離島。静かなビーチと星降る夜。" }, access: { en: "Ferry from Iriomote or Ishigaki (seasonal).", it: "Traghetto da Iriomote o Ishigaki.", ru: "Паром с Ириомоте или Исигаки.", ja: "西表島または石垣島から。" }, sights: { en: "Hatoma Beach, Hikido Cape, Sunset viewpoint.", it: "Spiaggia Hatoma, Capo Hikido, tramonto.", ru: "Пляж Хатома, мыс Хикидо.", ja: "鳩間ビーチ、干瀬御嶽。" }, tips: { en: "Limited services; bring essentials.", it: "Servizi limitati; porta l'essenziale.", ru: "Ограниченные услуги.", ja: "事前に食料・飲料の準備を。" } },
    // 周辺島 (宮古)
    irabu: { id: "irabu", name: { en: "Irabu", it: "Irabu", ru: "Ирабу", ja: "伊良部島" }, mainImg: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/IrabuBridge.jpg/800px-IrabuBridge.jpg", officialUrl: "https://www.miyakotravel.jp/", desc: { en: "Connected by Irabu Bridge to Miyako, rugged cliffs and blue caves.", it: "Collegata da ponte Irabu a Miyako, scogliere e grotte blu.", ru: "Соединен мостом Ирабу с Мияко.", ja: "伊良部大橋で宮古島と直結。青の洞窟。" }, access: { en: "Drive across Irabu Bridge from Miyako Island.", it: "Ponte da Miyako.", ru: "Мост из Мияко.", ja: "宮古島から車で渡橋。" }, sights: { en: "Toguchi no Hama, Blue Grotto, Sawada cliff.", it: "Toguchi no Hama, Grotta Blu, scogliera Sawada.", ru: "Пляж Тогути, Голубой грот.", ja: "渡口の浜、青の洞窟、佐和田の浜。" }, tips: { en: "Snorkeling gear is must for the grotto.", it: "Attrezzatura da snorkeling essenziale.", ru: "Обязательно возьмите маску.", ja: "青の洞窟ではシュノーケルがおすすめ。" } },
    shimoji: { id: "shimoji", name: { en: "Shimoji", it: "Shimoji", ru: "Симодзи", ja: "下地島" }, mainImg: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Shimoji_Island.jpg/800px-Shimoji_Island.jpg", officialUrl: "https://www.miyakotravel.jp/", desc: { en: "Famous for airport on reef and scenic ‘17 End’ cliffs.", it: "Famosa per l'aeroporto e scogliere 17 Ends.", ru: "Знаменитый аэропорт и скалы 17 Ends.", ja: "伊良部島の隣、潜水面で有名な「通り池」。" }, access: { en: "Connected by road from Irabu/Miyako.", it: "Strada da Irabu.", ru: "Дорога от Ирабу.", ja: "伊良部島を経由。" }, sights: { en: "Toriike Ponds, 17 Ends, Nishiura Beach.", it: "Stagni Toriike, 17 Ends, spiaggia Nishiura.", ru: "Пруды Ториикэ.", ja: "通り池、17エンド、西浦ビーチ。" }, tips: { en: "Check weather; strong winds often.", it: "Controlla il vento.", ru: "Проверяйте погоду.", ja: "風が強い日あり注意。" } },
    ikema: { id: "ikema", name: { en: "Ikema", it: "Ikema", ru: "Икема", ja: "池間島" }, mainImg: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/74/Ikema_Island_Miyako.jpg/800px-Ikema_Island_Miyako.jpg", officialUrl: "https://www.miyakotravel.jp/", desc: { en: "Linked by Ikema Ohashi bridge, rich with coral and sea turtles.", it: "Ponte Ikema Ohashi, tartarughe marine.", ru: "Мост Икема Охаси, морские черепахи.", ja: "池間大橋で結ばれた島。サンゴとウミガメ。" }, access: { en: "Bridge from Miyako Island.", it: "Ponte da Miyako.", ru: "Мост из Мияко.", ja: "宮古島から池間大橋で渡る。" }, sights: { en: "Ikema Beach, Observatory, Tongue-shaped reef.", it: "Spiaggia Ikema, osservatorio, barriera lingua.", ru: "Пляж Икема, обсерватория.", ja: "池間ビーチ、池間展望台。" }, tips: { en: "Rent bicycle to enjoy coastal road.", it: "Noleggia bici per strada costiera.", ru: "Арендуйте велосипед.", ja: "サイクリングが気持ちいい。" } },
    kurima: { id: "kurima", name: { en: "Kurima", it: "Kurima", ru: "Курима", ja: "来間島" }, mainImg: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Kurima_Island.jpg/800px-Kurima_Island.jpg", officialUrl: "https://www.miyakotravel.jp/", desc: { en: "Small island with beautiful Kurima Bridge and relaxing beach.", it: "Piccola isola con ponte Kurima.", ru: "Маленький остров, мост Курима.", ja: "来間大橋で結ばれ、のどかなビーチ。" }, access: { en: "Kurima Bridge from Miyako (car or bike).", it: "Ponte Kurima.", ru: "Мост Курима.", ja: "宮古島から来間大橋渡る。" }, sights: { en: "Kurima Beach, Ryugujo Observatory, farming village.", it: "Spiaggia Kurima, osservatorio Ryugujo.", ru: "Пляж Курима, обсерватория Рюгудзё.", ja: "来間ビーチ、竜宮城展望台。" }, tips: { en: "Quiet escape, perfect for picnic.", it: "Fuga tranquilla, pic-nic.", ru: "Тихий отдых.", ja: "静かな隠れ家。ピクニックに最適。" } }
  };

  const yaeyamaGroup = ["iriomote", "taketomi", "kohama", "kuro", "hatoma"];
  const miyakoGroup = ["irabu", "shimoji", "ikema", "kurima"];

  let currentLang = "en";
  let currentGroup = "yaeyama";

  function t(key) { return translations[currentLang][key] || translations.en[key]; }
  function getIslandName(island) { return island.name[currentLang] || island.name.en; }
  function getText(obj, key) { return (obj[key] && obj[key][currentLang]) ? obj[key][currentLang] : (obj[key] ? obj[key].en : ""); }

  // メインページ描画
  function renderHome() {
    const container = document.getElementById("mainIslandsGrid");
    const ishigaki = islandsData.ishigaki;
    const miyako = islandsData.miyako;
    container.innerHTML = `
      <div class="island-card">
        <img class="card-img" src="${ishigaki.mainImg}" alt="${getIslandName(ishigaki)}" data-detail="ishigaki" style="cursor:pointer">
        <div class="card-content">
          <div class="card-title">${getIslandName(ishigaki)}</div>
          <div class="card-desc">${t('ishigaki_desc')}</div>
          <img class="map-img" src="${ishigaki.mapImg}" alt="map">
          <div class="card-links">
            <a href="${ishigaki.officialUrl}" target="_blank" class="btn btn-outline">${t('official_site')}</a>
            <button class="btn btn-primary detail-main" data-id="ishigaki">${t('details')}</button>
            <button class="btn btn-primary surrounding-btn" data-group="yaeyama">🌏 ${t('surrounding')}</button>
          </div>
        </div>
      </div>
      <div class="island-card">
        <img class="card-img" src="${miyako.mainImg}" alt="${getIslandName(miyako)}" data-detail="miyako" style="cursor:pointer">
        <div class="card-content">
          <div class="card-title">${getIslandName(miyako)}</div>
          <div class="card-desc">${t('miyako_desc')}</div>
          <img class="map-img" src="${miyako.mapImg}" alt="map">
          <div class="card-links">
            <a href="${miyako.officialUrl}" target="_blank" class="btn btn-outline">${t('official_site')}</a>
            <button class="btn btn-primary detail-main" data-id="miyako">${t('details')}</button>
            <button class="btn btn-primary surrounding-btn" data-group="miyako">🌏 ${t('surrounding')}</button>
          </div>
        </div>
      </div>
    `;
    document.querySelectorAll('.card-img[data-detail]').forEach(img => {
      img.addEventListener('click', () => showDetailView(img.getAttribute('data-detail'), false));
    });
    document.querySelectorAll('.detail-main').forEach(btn => {
      btn.addEventListener('click', () => showDetailView(btn.getAttribute('data-id'), false));
    });
    document.querySelectorAll('.surrounding-btn').forEach(btn => {
      btn.addEventListener('click', () => showIslandList(btn.getAttribute('data-group')));
    });
  }

  // 周辺島一覧
  function showIslandList(group) {
    currentGroup = group;
    document.getElementById("listTitle").innerHTML = group === "yaeyama" ? t('yaeyama_title') : t('miyako_title');
    const islandIds = group === "yaeyama" ? yaeyamaGroup : miyakoGroup;
    const grid = document.getElementById("surroundingGrid");
    grid.innerHTML = islandIds.map(id => {
      const island = islandsData[id];
      const name = getIslandName(island);
      const desc = (getText(island, 'desc') || "").substring(0, 100);
      return `
        <div class="island-card">
          <img class="card-img" src="${island.mainImg}" alt="${name}" data-id="${id}" style="cursor:pointer">
          <div class="card-content">
            <div class="card-title">${name}</div>
            <div class="card-desc">${desc}...</div>
            <div class="card-links">
              <a href="${island.officialUrl}" target="_blank" class="btn btn-outline">${t('official_site')}</a>
              <button class="btn btn-primary list-detail" data-id="${id}">${t('details')}</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
    document.querySelectorAll('#surroundingGrid .card-img').forEach(img => {
      img.addEventListener('click', () => showDetailView(img.getAttribute('data-id'), true));
    });
    document.querySelectorAll('.list-detail').forEach(btn => {
      btn.addEventListener('click', () => showDetailView(btn.getAttribute('data-id'), true));
    });
    setActiveView('listView');
  }

  // 詳細表示
  function showDetailView(islandId, fromList) {
    const island = islandsData[islandId];
    if (!island) return;
    const name = getIslandName(island);
    const desc = getText(island, 'desc');
    const access = getText(island, 'access');
    const sights = getText(island, 'sights');
    const tips = getText(island, 'tips');
    const detailHtml = `
      <img class="detail-img" src="${island.mainImg}" alt="${name}">
      <h2>${name}</h2>
      <div class="detail-block"><h3>📖 Description</h3><p>${desc}</p></div>
      <div class="detail-block"><h3>🚢 ${t('access')}</h3><p>${access}</p></div>
      <div class="detail-block"><h3>🌟 ${t('sights')}</h3><p>${sights}</p></div>
      <div class="detail-block"><h3>💡 ${t('tips')}</h3><p>${tips}</p></div>
      <div class="card-links"><a href="${island.officialUrl}" target="_blank" class="btn btn-primary">${t('official_site')}</a></div>
    `;
    document.getElementById("dynamicDetail").innerHTML = detailHtml;
    const backToList = document.getElementById("backToListBtn");
    if (fromList) {
      backToList.style.display = "inline-flex";
      backToList.onclick = () => showIslandList(currentGroup);
    } else {
      backToList.style.display = "none";
    }
    document.getElementById("backToHomeFromDetail").onclick = () => setActiveView('homeView');
    setActiveView('detailView');
  }

  function setActiveView(viewId) {
    ['homeView', 'listView', 'detailView'].forEach(id => {
      document.getElementById(id).classList.remove('active');
    });
    document.getElementById(viewId).classList.add('active');
    window.scrollTo(0, 0);
  }

  // 言語切替時のUI更新
  function refreshUI() {
    document.title = t('app_title');
    document.getElementById("mainTitle").innerHTML = t('main_title_html');
    document.getElementById("backToHomeText").innerText = t('back_to_main');
    document.getElementById("backToListText").innerText = t('back_to_list');
    document.getElementById("backToHomeText2").innerText = t('back_to_main');
    document.getElementById("contactUsText").innerText = t('contact_us');
    if (document.getElementById('homeView').classList.contains('active')) renderHome();
    else if (document.getElementById('listView').classList.contains('active')) showIslandList(currentGroup);
    else if (document.getElementById('detailView').classList.contains('active')) {
      // 詳細が開いている場合: 現在表示されている島のIDを取得して再表示（簡易実装）
      const detailTitle = document.querySelector('#dynamicDetail h2');
      if (detailTitle) {
        const currentName = detailTitle.innerText;
        for (let id in islandsData) {
          if (getIslandName(islandsData[id]) === currentName) {
            const fromList = document.getElementById("backToListBtn").style.display !== "none";
            showDetailView(id, fromList);
            break;
          }
        }
      }
    }
  }

  // テーマ管理
  function initTheme() {
    const saved = localStorage.getItem("theme");
    if (saved === "light") setTheme("light");
    else setTheme("dark");
  }
  function setTheme(theme) {
    const html = document.documentElement;
    if (theme === "dark") {
      html.classList.remove("light");
      document.getElementById("themeToggle").textContent = "☀️";
    } else {
      html.classList.add("light");
      document.getElementById("themeToggle").textContent = "🌙";
    }
    localStorage.setItem("theme", theme);
  }
  function toggleTheme() {
    const isLight = document.documentElement.classList.contains("light");
    setTheme(isLight ? "dark" : "light");
  }

  // 初期化
  function init() {
    initTheme();
    document.getElementById("languageSelector").value = currentLang;
    document.getElementById("languageSelector").addEventListener("change", (e) => {
      currentLang = e.target.value;
      refreshUI();
    });
    document.getElementById("themeToggle").addEventListener("click", toggleTheme);
    document.getElementById("backToHomeFromList").addEventListener("click", () => setActiveView('homeView'));
    refreshUI();
  }
  init();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.log("SW error:", err));
    });
  }
</script>
</body>
</html>
